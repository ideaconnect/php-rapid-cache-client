services:
  valkey:
    image: valkey/valkey:7.2-alpine
    container_name: cache-service-valkey
    ports:
      - "6380:6379"  # Custom port mapping
    command: valkey-server --appendonly yes
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: cache-service-app
    volumes:
      - .:/var/www/html
    depends_on:
      valkey:
        condition: service_healthy
    environment:
      - REDIS_HOST=valkey
      - REDIS_PORT=6379
    working_dir: /var/www/html
    command: tail -f /dev/null

  test:
    build: .
    container_name: cache-service-test
    volumes:
      - .:/var/www/html
    depends_on:
      valkey:
        condition: service_healthy
    environment:
      - REDIS_HOST=valkey
      - REDIS_PORT=6379
    working_dir: /var/www/html
    command: composer test:functional

volumes:
  valkey_data:
