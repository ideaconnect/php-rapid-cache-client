services:
  valkey:
    image: valkey/valkey:7.2-alpine
    container_name: rapid-cache-client-valkey
    ports:
      - "6380:6379"
    command: valkey-server --appendonly yes
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  valkey_data:
